          {(isAdding || editingIndex !== null) && (
            <div className="form-container mb-6">
              <h3 className="text-lg font-semibold mb-4">{editingIndex !== null ? 'Edit' : 'Add'} {table === 'class_sections' ? subTab.replace('_', ' ') : table.replace('_', ' ')}</h3>
              <form onSubmit={table === 'student_data' ? handleStudentSubmit : handleSubmit}>
                {renderFormFields()}
                {formErrors.general && (
                  <p className={`${formErrors.general.includes('successfully') ? 'form-message' : 'form-error'}`}>{formErrors.general}</p>
                )}
                {message && (
                  <p className="form-message">{message}</p>
                )}
                <div className="form-actions">
                  <button
                    type="submit"
                    disabled={isLoading}
                    className={`btn-primary ${isLoading ? 'opacity-75 cursor-not-allowed' : ''}`}
                  >
                    {isLoading ? (
                      <>
                        <i className="uil uil-spinner text-xl loading-spinner"></i>
                        Saving...
                      </>
                    ) : editingIndex !== null ? 'Update' : 'Add'}
                  </button>
                 {table === 'student_data' && editingIndex !== null && canAmendSIRN && (
  <button
    type="button"
    onClick={() => setIsStdIdEditable(!isStdIdEditable)}
    className="btn-outline"
  >
    {isStdIdEditable ? 'Lock SIRN' : 'Amend SIRN'}
  </button>
)}
                  <button
                    type="button"
                    onClick={clearForm}
                    className="btn-outline"
                  >
                    Cancel
                  </button>
                </div>
              </form>
            </div>
          )}
          {!isAdding && editingIndex === null && (
            <div className="flex flex-wrap gap-2 mb-6">
              <button
                onClick={() => {
                  setIsAdding(true);
                  setFormData({});
                  setIsStdIdEditable(table === 'student_data');
                }}
                className="btn-primary"
              >
                Add New {table === 'class_sections' ? subTab.replace('_', ' ') : table.replace('_', ' ')}
              </button>
              <button
                onClick={() => refreshData()} 
                className="btn-secondary"
              >
                Refresh Data
              </button>
            </div>
          )}
          {isLoading ? (
            <p className="text-gray-500">Loading...</p>
          ) : filteredData.length === 0 ? (
            <p className="text-gray-500">No data available</p>
          ) : (
            <div className="table-container max-h-[600px]">
              <table className="min-w-full">
                <thead className="sticky-header">
                  <tr>
                    {(table === 'student_data'
                      ? [
                      { name: 'Unique_ID' },  // ← ADD THIS FIRST
                          { name: 'Std_ID' },
                          { name: 'Barcode_ID' },
                          { name: 'Student_Name' },
                          { name: 'Gender' },
                          { name: 'Date_of_Joining' },
                          { name: 'Student_Class' },
                          { name: 'Student_Section' },
                          { name: 'Status' },
                          { name: 'Inactive_Date' },
                          { name: 'Creation_Date' },
                          { name: 'Created_By' },
                          { name: 'Last_Modified_Date' },
                          { name: 'Last_Modified_By' },
                          { name: 'REC_ID' },  // ← ADD THIS
                        ]
                      : (table === 'class_sections' ? tableConfigs[subTab].fields.flatMap(s => s.fields) : tableConfigs[table].fields.flatMap(s => s.fields))
                    ).map(field => (
                      <th key={field.name}>
                        {field.name.replace('_', ' ')}
                      </th>
                    ))}
                    <th>Actions</th>
                  </tr>
                </thead>
               <tbody>
  {filteredData
    .filter(item => item.Username !== 'superadmin')
    .map((item, index) => (
      <tr key={index}>
                      {(table === 'student_data'
                        ? [
                         { name: 'Unique_ID' },  // ← ADD THIS
                            { name: 'Std_ID' },
                            { name: 'Barcode_ID' },
                            { name: 'Student_Name' },
                            { name: 'Gender' },
                            { name: 'Date_of_Joining' },
                            { name: 'Student_Class' },
                            { name: 'Student_Section' },
                            { name: 'Status' },
                            { name: 'Inactive_Date' },
                            { name: 'Creation_Date' },
                            { name: 'Created_By' },
                            { name: 'Last_Modified_Date' },
                            { name: 'Last_Modified_By' },
                            { name: 'REC_ID' },  // ← ADD THIS
                          ]
                        : (table === 'class_sections' ? tableConfigs[subTab].fields.flatMap(s => s.fields) : tableConfigs[table].fields.flatMap(s => s.fields))
                      ).map(field => (
                        <td key={field.name}>
                          {item[field.name] || ''}
                        </td>
                      ))}
                      <td>
                        <button
                          onClick={() => handleEditClick(index)}
                          className="text-blue-500 hover:underline mr-4"
                        >
                          Edit
                        </button>
                        <button
                          onClick={() => {
                            if (table === 'student_data' && !canDeleteStudent) {
                              setError('You do not have permission to delete student records');
                              return;
                            }
                            handleDeleteClick(table, index, item._rowNumber);
                          }}
                          className={`text-red-500 hover:underline ${table === 'student_data' && !canDeleteStudent ? 'opacity-50 cursor-not-allowed' : ''}`}
                          disabled={table === 'student_data' && !canDeleteStudent}
                        >
                          Delete
                        </button>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
          {showDeleteConfirm && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
              <div className="card p-6 max-w-sm w-full">
                <h3 className="text-lg font-semibold mb-4">Confirm Delete</h3>
                <p className="text-gray-600 dark:text-gray-400 mb-4">Are you sure you want to delete this record?</p>
                <div className="flex space-x-4">
                  <button
                    onClick={confirmDelete}
                    className="btn-primary"
                  >
                    Yes, Delete
                  </button>
                  <button
                    onClick={() => setShowDeleteConfirm(false)}
                    className="btn-outline"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
